{% extends "base.html" %}

{% block content %}
<article class="article-shell glass-panel">
  <header class="article-header">
    <h1>{{ section.title }}</h1>
    {% if section.description %}<p>{{ section.description }}</p>{% endif %}
  </header>
  <div class="prose">
    {{ section.content | safe }}
  </div>
</article>
{% endblock content %}
