<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>{% block title %}{% if page %}{{ page.title }} · {% elif section and section.title %}{{ section.title }} · {% endif %}{{ config.title }}{% endblock title %}</title>
  <meta name="description" content="{% if page and page.description %}{{ page.description }}{% elif section and section.description %}{{ section.description }}{% else %}{{ config.description }}{% endif %}">
  <link rel="icon" href="{{ get_url(path='favicon.svg') }}" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <script>
    (function () {
      try {
        var theme = localStorage.getItem("theme");
        if (theme === "light" || theme === "dark") {
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        }
      } catch (error) {}
    })();
  </script>
  <link rel="stylesheet" href="{{ get_url(path='main.css') }}">
</head>
<body class="{% block body_class %}{% endblock body_class %}">
  <svg class="liquid-glass-filter" aria-hidden="true" focusable="false">
    <filter id="liquid-glass" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feImage id="liquid-glass-map" result="glassMap" preserveAspectRatio="none" />
      <feDisplacementMap in="SourceGraphic" in2="glassMap" scale="22" xChannelSelector="R" yChannelSelector="G" />
    </filter>
    <filter id="dock-liquid-glass" x="-28%" y="-70%" width="156%" height="240%" color-interpolation-filters="sRGB">
      <feImage id="dock-liquid-glass-map" result="dockGlassMap" preserveAspectRatio="none" />
      <feDisplacementMap in="SourceGraphic" in2="dockGlassMap" scale="34" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </svg>
  <div class="site-shell">
    <header class="site-header glass-panel" data-elevated>
      <a class="brand" href="{{ get_url(path='@/_index.md') }}" aria-label="{{ config.title }} home">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>
          <strong>{{ config.title }}</strong>
          <small>{{ config.extra.author }}</small>
        </span>
      </a>

      <nav id="site-nav" class="site-nav" aria-label="Primary navigation">
        <a href="{{ get_url(path='@/posts/_index.md') }}">Posts</a>
        <a href="{{ get_url(path='@/moments/_index.md') }}">Moments</a>
        <a href="{{ get_url(path='tags') }}">Tags</a>
        <a href="{{ get_url(path='categories') }}">Categories</a>
        <a href="{{ get_url(path='@/search/_index.md') }}">Search</a>
        <a href="{{ get_url(path='@/about/_index.md') }}">About</a>
      </nav>

      <div class="site-header-actions">
        <button class="theme-toggle" type="button" aria-label="Switch to dark theme" aria-pressed="false">
          <span class="theme-toggle__icon" aria-hidden="true">☀</span>
        </button>

        <button class="site-nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
          <span class="site-nav-toggle__label">Menu</span>
          <span class="site-nav-toggle__icon" aria-hidden="true"></span>
        </button>
      </div>
    </header>

    <main id="content">
      {% block content %}{% endblock content %}
    </main>

    <footer class="site-footer">
      <p>© {{ now() | date(format="%Y") }} {{ config.extra.author }}. Built with Zola.</p>
    </footer>
  </div>

  <script src="{{ get_url(path='js/liquid-glass-sdf.js') }}?v=2" defer></script>
  <script src="{{ get_url(path='js/mobile-nav.js') }}?v=3" defer></script>
  <script src="{{ get_url(path='js/theme-toggle.js') }}?v=1" defer></script>
  <script src="{{ get_url(path='js/code-copy.js') }}" defer></script>
  <script src="{{ get_url(path='js/imgloop.js') }}" defer></script>
  {% block scripts %}{% endblock scripts %}
</body>
</html>
